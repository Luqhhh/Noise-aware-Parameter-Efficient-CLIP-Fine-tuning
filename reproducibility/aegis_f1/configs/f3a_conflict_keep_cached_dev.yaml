# F3A - cached control for the F1 clean-core replay.
#
# This run keeps high-confidence OOF consensus conflicts exactly as F1 did.
# F3B changes only that policy, so their independent validation difference is
# attributable to conflict exclusion rather than to visual LoRA or augmentation.
project:
  experiment_id: F3A_CONFLICT_KEEP_CACHED_DEV
  seed: 42
  stage: preliminary

data:
  train_csv: ../artifacts/stages/preliminary/seed42/train.csv
  val_csv: ../artifacts/stages/preliminary/seed42/val.csv
  class_mapping: ../artifacts/stages/preliminary/seed42/class_to_idx.json
  train_root: /home/x28639/projects/Noise-aware-Parameter-Efficient-CLIP-Fine-tuning/train
  test_root: /home/x28639/projects/Noise-aware-Parameter-Efficient-CLIP-Fine-tuning/test
  train_augmentation: clip_center_crop
  external_data: false
  test_usage: inference_only
  expected_official_train_samples: 103218
  expected_test_samples: 24967

features:
  tensor_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/features.pt
  paths_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/image_paths.json
  manifest_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/manifest.json

model:
  backbone: ViT-B/32
  pretrained: openai
  num_classes: 500
  feature_dim: 512
  peft_mode: frozen
  use_cached_training: true

trust:
  enabled: true
  bundle_path: ../artifacts/trust/cvt_v1.pt
  groups_path: ../artifacts/stages/preliminary/seed42/content_groups.json
  weighting_start_epoch: 1
  correction_start_epoch: 99
  minimum_sample_weight: 1.0
  selection_threshold: 0.70
  rejected_sample_weight: 0.0
  anchor_threshold: 0.80
  consensus_conflict:
    mode: keep
    minimum_pseudo_confidence: 0.85
  gradient_projection:
    enabled: false
    start_epoch: 1
    interval: 8
    minimum_anchor_samples: 8

loss:
  name: gce
  gce_q: 0.5
  epsilon: 1.0e-7
  ce_warmup_epochs: 0
  class_prior_adjustment_tau: 0.0
  mixup_alpha: 0.0
  mixup_probability: 0.0
  feature_distillation_weight: 0.0
  adaptive_cap:
    enabled: false

train:
  device: cuda
  deterministic: true
  amp: true
  epochs: 6
  batch_size: 512
  num_workers: 0
  loader_timeout: 0
  pin_memory: false
  head_lr: 0.00005
  head_weight_decay: 0.0001
  backbone_lr: 0.0
  backbone_weight_decay: 0.0
  lr_warmup_epochs: 1
  max_grad_norm: 1.0
  early_stop_patience: 0
  init_checkpoint: ../outputs/E2_MIXUP_CE5_REPLICA/seed42/checkpoints/best.pt

evaluation:
  batch_size: 512
  inference_batch_size: 128
  selector_metric: clean_core_micro
  clean_core_threshold: 0.70
  measure_flip_consistency: false
  drift_budget: 0.01
  drift_penalty: 2.0

output:
  root: ../outputs
