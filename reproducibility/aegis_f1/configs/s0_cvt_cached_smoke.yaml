# S0 — fast end-to-end engineering smoke test, not a leaderboard candidate.
project:
  experiment_id: S0_FULLDATA_CVT_CACHED_SMOKE
  seed: 42
  stage: preliminary

data:
  train_csv: ../artifacts/stages/preliminary/seed42/train.csv
  val_csv: ../artifacts/stages/preliminary/seed42/val.csv
  class_mapping: ../artifacts/stages/preliminary/seed42/class_to_idx.json
  train_root: /home/x28639/projects/Noise-aware-Parameter-Efficient-CLIP-Fine-tuning/train
  test_root: /home/x28639/projects/Noise-aware-Parameter-Efficient-CLIP-Fine-tuning/test
  external_data: false
  test_usage: inference_only
  expected_official_train_samples: 103218
  expected_test_samples: 24967

features:
  tensor_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/features.pt
  paths_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/image_paths.json
  manifest_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/manifest.json

model:
  backbone: ViT-B/32
  pretrained: openai
  num_classes: 500
  feature_dim: 512
  peft_mode: frozen
  use_cached_training: true

trust:
  enabled: true
  bundle_path: ../artifacts/trust/cvt_v1.pt
  groups_path: ../artifacts/stages/preliminary/seed42/content_groups.json
  weighting_start_epoch: 1
  correction_start_epoch: 0
  minimum_sample_weight: 0.25
  anchor_threshold: 0.80
  gradient_projection:
    enabled: false
    start_epoch: 1
    interval: 0
    minimum_anchor_samples: 8

loss:
  name: gce
  gce_q: 0.5
  epsilon: 1.0e-7
  ce_warmup_epochs: 1
  class_prior_adjustment_tau: 0.0
  mixup_alpha: 0.2
  mixup_probability: 0.2
  feature_distillation_weight: 0.0
  adaptive_cap:
    enabled: false

train:
  device: cuda
  deterministic: true
  amp: true
  epochs: 3
  batch_size: 2048
  num_workers: 0
  loader_timeout: 0
  pin_memory: true
  head_lr: 0.005
  head_weight_decay: 0.0001
  backbone_lr: 0.0
  backbone_weight_decay: 0.0
  lr_warmup_epochs: 1
  max_grad_norm: 1.0
  early_stop_patience: 0

evaluation:
  batch_size: 4096
  inference_batch_size: 128
  selector_metric: proxy_macro
  drift_budget: 0.01
  drift_penalty: 0.5

output:
  root: ../outputs
