project:
  experiment_id: P2_CR2_SOFT_GATE
  seed: 42
  stage: preliminary
data:
  train_csv: ../../../outputs/data/d3_strict/seed42/train.csv
  val_csv: ../../../outputs/data/d3_strict/seed42/val.csv
  class_mapping: ../artifacts/stages/preliminary/seed42/class_to_idx.json
  train_root: ../../..
  test_root: ../../../test
  train_augmentation: weak_rrc_flip
  external_data: false
  test_usage: inference_only
  expected_official_train_samples: 103218
  expected_test_samples: 24967
features:
  tensor_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/features.pt
  paths_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/image_paths.json
  manifest_path: ../artifacts/stages/preliminary/features/clip_vit_b32_openai/manifest.json
model:
  backbone: ViT-B/32
  pretrained: openai
  num_classes: 500
  feature_dim: 512
  peft_mode: visual_lora
  use_cached_training: false
  lora_last_n_blocks: 4
  lora_rank: 8
  lora_alpha: 8.0
  lora_adapt_qv: true
  lora_adapt_out: true
trust:
  enabled: true
  bundle_path: ../artifacts/trust/cvt_v1.pt
  weighting_start_epoch: 1
  correction_start_epoch: 99
  minimum_sample_weight: 1.0
  selection_threshold: 0.7
  rejected_sample_weight: 0.0
  anchor_threshold: 0.8
  gradient_projection:
    enabled: false
    start_epoch: 1
    interval: 8
    minimum_anchor_samples: 8
loss:
  name: gce
  gce_q: 0.5
  epsilon: 1.0e-07
  ce_warmup_epochs: 0
  class_prior_adjustment_tau: 0.0
  mixup_alpha: 0.0
  mixup_probability: 0.0
  feature_distillation_weight: 2.0
  adaptive_cap:
    enabled: false
train:
  device: cuda
  deterministic: true
  amp: true
  epochs: 6
  batch_size: 64
  num_workers: 4
  prefetch_factor: 1
  loader_timeout: 120
  pin_memory: true
  head_lr: 5.0e-05
  head_weight_decay: 0.0001
  backbone_lr: 2.0e-05
  backbone_weight_decay: 0.0
  lr_warmup_epochs: 1
  max_grad_norm: 1.0
  early_stop_patience: 0
  init_checkpoint: ../../../outputs/oof/nr_cl_knn_drop/seed42/checkpoints/best.pt
  require_lineage_for_init_checkpoint: true
lineage:
  enabled: true
  parent_experiment_id: NR_CL_KNN_DROP
  parent_train_csv: ../../../outputs/data/d3_strict/seed42/train.csv
  parent_val_csv: ../../../outputs/data/d3_strict/seed42/val.csv
  require_same_train: true
  require_same_val: true
promotion:
  minimum_selector_gain: 0.001
  minimum_raw_micro_gain: -0.001
  maximum_mean_feature_drift: 0.01
  required_predicted_class_count: 500
evaluation:
  batch_size: 128
  inference_batch_size: 128
  selector_metric: clean_core_micro
  clean_core_threshold: 0.7
  measure_flip_consistency: true
  drift_budget: 0.01
  drift_penalty: 2.0
output:
  root: ../outputs
clean_routing:
  enabled: true
  mode: soft
  threshold: 0.7
  start_epoch: 1
