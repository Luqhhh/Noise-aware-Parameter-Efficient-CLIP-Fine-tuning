# C-1: GCE q=0.7 + Linear Head EMA (decay=0.99).
# Parent: gce_q07 (B2_GCE07). Trains from scratch with EMA on classifier head.
# Split/data/loss inherited from gce_q07; only adds head_ema block.

experiment:
  id: C1_GCE07_HEAD_EMA099
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.7
  probability_epsilon: 1.0e-7

head_ema:
  enabled: true
  decay: 0.99
  warmup_epochs: 5
  selection_source: ema

eval:
  batch_size: 256

output:
  log_dir: outputs/phase3/c1_head_ema/logs
  submission_dir: outputs/phase3/c1_head_ema/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/phase3/c1_head_ema/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
