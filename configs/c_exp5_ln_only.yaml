# C-EXP-5: Visual LayerNorm-only tuning from W1_CE5_GCE05 best checkpoint.
# Init from w1_ce5_gce05 seed42 best.pt. Unfreeze all visual LayerNorm + linear head.
# Purpose: allow feature recalibration without changing feature directions.
# Only ~40K trainable visual params (vs 395K for LN+Projection).
# Phase 3 W4-2: head_lr=1e-4, layernorm_lr=5e-6, epochs=12, patience=5.
#
# Run: python3 -m experiments.baseline.train --config configs/c_exp5_ln_only.yaml \
#        --init-checkpoint outputs/gce/ce5_gce_q05/seed42/checkpoints/best.pt

experiment:
  id: C_EXP5_LN_ONLY
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/baselines/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

peft:
  type: visual_layernorm_only
  backbone_lr: 0.000005
  backbone_weight_decay: 0.0001

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

eval:
  batch_size: 256

output:
  log_dir: outputs/peft/ln_only/seed42/logs
  submission_dir: outputs/peft/ln_only/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 12
  image_size: 224
  lr: 0.0001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/peft/ln_only/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 5
