data:
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_dir: outputs/baseline/splits
  test_dir: data/preliminary/test
  train_dir: data/preliminary/train
  val_ratio: 0.1
eval:
  batch_size: 256
model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
output:
  log_dir: outputs/baseline/logs
  submission_dir: outputs/baseline/submissions
train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 20
  image_size: 224
  lr: 0.001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/baseline/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
