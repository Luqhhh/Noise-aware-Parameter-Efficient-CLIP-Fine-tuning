experiment:
  id: drop_p07
  mode: dev
  head_type: linear
  augmentation_preset: a0
data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  split_seed: 42
  train_seed: 42
  split_dir: outputs/d3/splits
  test_dir: test
  train_dir: train_dedup
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/metadata
  use_full_training_set: false
model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: true
  dropout: 0.7
cache:
  cache_dir: cache/preliminary/clip_vit_b32_openai_dedup
  verification: full
eval:
  batch_size: 256
output:
  log_dir: outputs/drop_p07/logs
  submission_dir: outputs/drop_p07/submissions
train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/drop_p07/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
  early_stop_patience: 10
