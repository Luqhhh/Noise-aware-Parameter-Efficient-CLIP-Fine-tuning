# Label Smoothing epsilon=0.05 on ref split.
# Same hyperparameters as gce_q07 for fair comparison.
# Platform: 57.3918% (flat vs ref) — previously submitted without saved checkpoint.
# Now retraining with TTA evaluation.

experiment:
  id: ls005
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: label_smoothing
  epsilon: 0.05

eval:
  batch_size: 256

output:
  log_dir: outputs/ls005/seed42/logs
  submission_dir: outputs/ls005/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/ls005/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
