# Robust direction A: continuous OOF confidence weighting + fixed soft targets.
# No hard KEEP/DROP/RELABEL decisions; all samples remain in training.

experiment:
  id: ROBUST_OOF_SOFT
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/data/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

sample_weighting:
  type: oof_soft_targets
  logits_path: outputs/phase3/oof/oof_logits.pt
  quality_path: outputs/phase/phase3/oof/sample_quality.csv
  min_weight: 0.6
  max_weight: 1.0
  normalize_by_weight_sum: true
  missing_weight_policy: error

soft_targets:
  enabled: true
  temperature: 1.5
  loss_weight: 0.25

mixup:
  enabled: false

eval:
  batch_size: 256

output:
  log_dir: outputs/robust/oof_soft/seed42/logs
  submission_dir: outputs/robust/oof_soft/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/robust/oof_soft/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
