# S_ELR_BASE: GCE q=0.5 + MixUp + Early Learning Regularization
# Maintains per-sample EMA of historical predictions and penalizes
# divergence from them — prevents late-stage memorization of noisy labels.
#
# Reference: Liu et al., "Early-Learning Regularization Prevents
# Memorization of Noisy Labels", NeurIPS 2020.
#
# ELR rule (§5.4): MixUp batches skip ELR (mixed inputs don't correspond
# to single real samples). Only non-MixUp batches update targets.
#
# Parent: W1_GCE05_MIXUP (platform bare 59.86%, TTA 60.36%)
# Compare: S_D3_MIXUP (same config, no ELR), W1_GCE05_MIXUP
#
# Run: python3 -m experiments.baseline.train --config configs/s_elr_base.yaml

experiment:
  id: S_ELR_BASE
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/data/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

elr:
  enabled: true
  momentum: 0.9
  target_weight: 1.0
  warmup_epochs: 10
  ramp_epochs: 10

eval:
  batch_size: 256

output:
  log_dir: outputs/elr/base/seed42/logs
  submission_dir: outputs/elr/base/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/elr/base/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
