# C-EXP-7: EMA Teacher + Consistency from W1_GCE05_MIXUP best checkpoint.
# Init from w1_gce05_mixup seed42 best.pt (60.36% platform TTA, current best).
# Teacher is EMA of student (decay=0.999), never backpropagated.
# Consistency loss: MSE between student and teacher logits, confidence mask >= 0.90.
# All CLIP visual params FROZEN — only linear head trains.
#
# Run: python3 -m experiments.baseline.train --config configs/c_exp7_teacher.yaml \
#        --init-checkpoint outputs/w1_gce05_mixup/seed42/checkpoints/best.pt

experiment:
  id: C_EXP7_TEACHER
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

teacher:
  enabled: true
  ema_decay: 0.999
  confidence_threshold: 0.90
  consistency_weight: 0.5
  ramp_epochs: 10
  flip_consistency: true

eval:
  batch_size: 256

output:
  log_dir: outputs/c_exp7_teacher/seed42/logs
  submission_dir: outputs/c_exp7_teacher/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 30
  image_size: 224
  lr: 0.0001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/c_exp7_teacher/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 5
