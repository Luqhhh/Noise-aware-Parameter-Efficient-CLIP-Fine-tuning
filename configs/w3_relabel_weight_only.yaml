# A-EXP-7 / W3_RELABEL_WEIGHT_ONLY: Conservative Relabel Weight-Only
# Multi-signal disagreement scoring — no label changes, only weight reduction.
#
# Weights based on how many independent signals disagree with the label:
#   0 signals disagree → w=1.0 (clean)
#   1 signal disagrees  → w=0.7 (mild doubt)
#   2 signals disagree  → w=0.5 (likely noisy)
#   ≥3 signals disagree → w=0.3 (probably wrong)
#
# Signals: oof_top1≠label, knn disagreement, proto_top1≠label,
#          p_OOF(label)<0.10, duplicate conflict
#
# Hard relabel (A-EXP-8) is gated — requires this experiment to show
# positive signal first. Weight-only = conservative first step.
#
# Parent: W1_GCE05_MIXUP (current best, platform bare 59.86%)
# Compare: w2_ema_loss, w2_proto_min04, s_oof_discrete, s_oof_zero_0001
#
# Run: python3 -m experiments.baseline.train --config configs/w3_relabel_weight_only.yaml

experiment:
  id: W3_RELABEL_WEIGHT_ONLY
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

sample_weighting:
  type: relabel_manifest
  manifest_path: outputs/phase3/relabel/relabel_weight_only_manifest.csv
  min_weight: 0.3
  max_weight: 1.0
  hard_relabel: false
  missing_policy: error

eval:
  batch_size: 256

output:
  log_dir: outputs/w3_relabel_weight_only/seed42/logs
  submission_dir: outputs/w3_relabel_weight_only/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/w3_relabel_weight_only/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
