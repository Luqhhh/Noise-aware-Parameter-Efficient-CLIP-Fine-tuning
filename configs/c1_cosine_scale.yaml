# C1 Config: Cosine + A0, learnable scale, init_scale=10
# C1 uses cached features with learnable cosine scale.
# Inherits E1's lr/wd after hyperparameter search.

experiment:
  id: C1
  mode: dev
  head_type: cosine
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  split_seed: 42
  train_seed: 42
  split_dir: outputs/c1/splits
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/metadata
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: true
  cos_init_scale: 10
  cos_learnable_scale: true

cache:
  cache_dir: cache/preliminary/clip_vit_b32_openai
  verification: full

eval:
  batch_size: 256

output:
  log_dir: outputs/c1/logs
  submission_dir: outputs/c1/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 20
  image_size: 224
  lr: 0.001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/c1/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
