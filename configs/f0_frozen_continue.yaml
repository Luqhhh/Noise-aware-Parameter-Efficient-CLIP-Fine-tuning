# F0: Frozen continue — 50 extra epochs with frozen CLIP, no visual unfreezing.
# Purpose: baseline to isolate "just more training" from "partial unfreeze" effect.
# Init from best augmentation checkpoint via --init-checkpoint.

experiment:
  id: F0_FROZEN_CONTINUE
  mode: dev
  head_type: linear
  augmentation_preset: a0  # B2 discovery: A0 beats all augmentations

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  split_seed: 42
  train_seed: 42
  split_dir: outputs/f0/splits
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/metadata
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

eval:
  batch_size: 256

output:
  log_dir: outputs/f0/logs
  submission_dir: outputs/f0/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.0003
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/f0/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
