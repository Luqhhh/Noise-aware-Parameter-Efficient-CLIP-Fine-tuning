# E5 Config: Cosine + best augmentation, online encoding
# E5 uses cosine head with the best-performing augmentation preset.
# E5 cannot use cached features due to non-A0 augmentation.

experiment:
  id: cos_a3
  mode: dev
  head_type: cosine
  augmentation_preset: a3  # placeholder — update after ablation selection

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  split_seed: 42
  train_seed: 42
  split_dir: outputs/cos_a3/splits
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/metadata
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  cos_init_scale: 10
  cos_learnable_scale: true

eval:
  batch_size: 256

output:
  log_dir: outputs/cos_a3/logs
  submission_dir: outputs/cos_a3/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 20
  image_size: 224
  lr: 0.001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/cos_a3/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
