# S-MIXUP-1: CE 5-epoch warmup → GCE q=0.5 + MixUp
# Combines the best local method (CE warmup, +3.65pp local) with the best
# platform method (MixUp, only method that transfers gains to platform).
# Hypothesis: CE warmup builds a better early decision boundary; MixUp
# provides the input regularization needed to transfer that gain to the
# test distribution.  These solve different problems and should be additive.
#
# Parent: w1_gce05_mixup (platform TTA 60.36%, current overall best)
# Compare: w1_gce05_mixup (no warmup) and w1_ce5_gce05 (warmup, no MixUp)
#
# Run: python3 -m experiments.baseline.train --config configs/s_mixup_ce5.yaml

experiment:
  id: S_MIXUP_CE5
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/baselines/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  schedule:
    - start_epoch: 1
      end_epoch: 5
      name: cross_entropy
    - start_epoch: 6
      end_epoch: 50
      name: gce
      q: 0.5
      probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

eval:
  batch_size: 256

output:
  log_dir: outputs/mixup/ce5/seed42/logs
  submission_dir: outputs/mixup/ce5/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/mixup/ce5/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
