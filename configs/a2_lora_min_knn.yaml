project:
  experiment_id: A2_LORA_MIN_KNN_DROP
  seed: 42
  stage: preliminary
data:
  train_csv: ../outputs/a2_lora_min_knn_split_train.csv
  val_csv: ../outputs/a2_lora_full_knn_split_val.csv
  class_mapping: ../outputs/data/master_splits/seed42/class_to_idx.json
  train_root: ../
  test_root: ../
  train_augmentation: weak_rrc_flip
  external_data: false
  test_usage: inference_only
  expected_official_train_samples: 103218
  expected_test_samples: 24967
features:
  tensor_path: ../cache/preliminary/clip_vit_b32_openai/features.pt
  paths_path: ../cache/preliminary/clip_vit_b32_openai/image_paths.json
  manifest_path: null
model:
  backbone: ViT-B/32
  pretrained: openai
  num_classes: 500
  feature_dim: 512
  peft_mode: visual_lora
  use_cached_training: false
  lora_last_n_blocks: 1
  lora_rank: 4
  lora_alpha: 8.0
  lora_adapt_qv: true
  lora_adapt_out: true
trust:
  enabled: true
  bundle_path: ../outputs/a2_lora_min_knn/seed42/knn_drop_trust.pt
  weighting_start_epoch: 1
  correction_start_epoch: 1
  minimum_sample_weight: 0.0
  selection_threshold: 0.0
  rejected_sample_weight: 0.0
  anchor_threshold: 0.7
  gradient_projection: {enabled: false}
loss:
  name: gce
  gce_q: 0.5
  epsilon: 1.0e-7
  mixup_alpha: 0.2
  mixup_probability: 0.2
  feature_distillation_weight: 2.0
train:
  device: cuda
  deterministic: true
  amp: true
  epochs: 6
  batch_size: 64
  num_workers: 4
  prefetch_factor: 1
  loader_timeout: 120
  pin_memory: true
  head_lr: 0.005
  head_weight_decay: 0.0001
  backbone_lr: 0.00002
  backbone_weight_decay: 0.0
  lr_warmup_epochs: 1
  max_grad_norm: 1.0
  early_stop_patience: 0
  init_checkpoint: ../outputs/a2_parent/seed42/checkpoints/A2_NR_CL_KNN_DROP_seed42_best.pt
evaluation:
  batch_size: 128
  inference_batch_size: 128
  selector_metric: raw_micro
  measure_flip_consistency: true
  drift_budget: 0.01
  drift_penalty: 2.0
output:
  root: ../outputs/a2_lora_min_knn
