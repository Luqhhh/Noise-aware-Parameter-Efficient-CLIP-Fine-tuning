# F2-D3-init: Unfreeze last Transformer block, init from D3 (skip F1 step).
# Control experiment: does the F1 intermediate step matter?
# Same as F2 primary but init from D3 best instead of F1 best.
# Init from D3 best checkpoint via --init-checkpoint.

experiment:
  id: F2_D3_INIT
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/f2_d3_init/splits
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/metadata
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: false
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 1
  train_ln_post: true
  train_visual_proj: true
  dropout: 0.2

eval:
  batch_size: 256

output:
  log_dir: outputs/f2_d3_init/logs
  submission_dir: outputs/f2_d3_init/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.0001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/f2_d3_init/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  backbone_lr: 0.00001
  backbone_weight_decay: 0.01
  min_lr_ratio: 0.01
  early_stop_patience: 10
