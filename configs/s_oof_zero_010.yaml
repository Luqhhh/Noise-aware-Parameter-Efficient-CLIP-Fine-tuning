# S_OOF_ZERO_010: GCE q=0.5 + MixUp + OOF zero-weight (p<0.10)
# Hard-zero samples where p_OOF(label) < 0.10 (~21% of training data).
# Most aggressive threshold — removes all samples below 10% OOF confidence.
# Remaining samples keep full weight (w=1.0). Binary: zero-or-one.
#
# Parent: w1_gce05_mixup (platform bare 59.86%, TTA 60.36%)
# Compare: S_OOF_ZERO_005 (p<0.05), all other thresholds
#
# Run: python3 -m experiments.baseline.train --config configs/s_oof_zero_010.yaml

experiment:
  id: S_OOF_ZERO_010
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/data/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

sample_weighting:
  type: oof_manifest
  manifest_path: outputs/phase/phase3/oof/oof_zero_weight_manifest_thresh0.100.csv
  min_weight: 0.0
  max_weight: 1.0
  missing_policy: error
  reject_policy: drop

eval:
  batch_size: 256

output:
  log_dir: outputs/oof/zero_010/seed42/logs
  submission_dir: outputs/oof/zero_010/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/oof/zero_010/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
