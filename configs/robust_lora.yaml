# Robust direction B: robust linear-head parent, then lightweight LoRA.
# Parent checkpoint is the completed strict B2 GCE q=0.5 head.

experiment:
  id: ROBUST_LORA
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/data/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: false
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

peft:
  type: last_block_lora
  freeze_classifier: false
  lora:
    rank: 8
    alpha: 16
    dropout: 0.05
    target_block: 11
    lora_lr: 0.00001

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: false

eval:
  batch_size: 256

output:
  log_dir: outputs/robust/lora/seed42/logs
  submission_dir: outputs/robust/lora/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 12
  image_size: 224
  lr: 0.0001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/robust/lora/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 5
