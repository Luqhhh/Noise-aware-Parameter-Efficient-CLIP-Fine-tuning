# B-EXP-4b: GCE q=0.5 + low-intensity MixUp diagnostic
# Based on W1_GCE07_MIXUP, switching base loss from q=0.7 to q=0.5.
# MixUp alpha=0.2, probability=0.2 — weak mixing for fine-grained task.
# Single seed=42; kill if no positive signal vs b2_gce05 (q=0.5, no MixUp).
# No extra augmentations, no label smoothing, no EMA loss, no head EMA.

experiment:
  id: W1_GCE05_MIXUP
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

eval:
  batch_size: 256

output:
  log_dir: outputs/w1_gce05_mixup/seed42/logs
  submission_dir: outputs/w1_gce05_mixup/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/w1_gce05_mixup/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
