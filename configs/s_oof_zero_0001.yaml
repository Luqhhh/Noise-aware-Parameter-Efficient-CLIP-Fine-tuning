# S_OOF_ZERO_0001: GCE q=0.5 + MixUp + OOF zero-weight (p<0.001)
# Hard-zero samples where p_OOF(label) < 0.001 (~7% of training data).
# These are the most egregiously mislabeled samples — OOF model assigns
# essentially zero probability to the given label.
# Remaining samples keep full weight (w=1.0). Binary: zero-or-one.
#
# Parent: w1_gce05_mixup (platform bare 59.86%, TTA 60.36%)
# Compare: s_oof_discrete (same config, no hard-zero), w1_gce05_mixup (no weighting)
#
# Run: python3 -m experiments.baseline.train --config configs/s_oof_zero_0001.yaml

experiment:
  id: S_OOF_ZERO_0001
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/d3_strict/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

sample_weighting:
  type: oof_manifest
  manifest_path: outputs/phase3/oof/oof_zero_weight_manifest_thresh0.001.csv
  min_weight: 0.0
  max_weight: 1.0
  missing_policy: error

eval:
  batch_size: 256

output:
  log_dir: outputs/s_oof_zero_0001/seed42/logs
  submission_dir: outputs/s_oof_zero_0001/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/s_oof_zero_0001/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
