# S_PEFT_E3: Backbone-only LayerNorm — continue from W1_GCE05_MIXUP parent.
#
# Parent recipe (recorded for audit):
#   parent_experiment_id:  W1_GCE05_MIXUP
#   parent_checkpoint:     outputs/w1_gce05_mixup/seed42/checkpoints/best.pt
#   parent_recipe:         GCE q=0.5 + MixUp(alpha=0.2, probability=0.2)
#
# Purpose: causal diagnostic — isolate whether noise-supervised LN-only backbone
# training degrades visual representations independently, or whether degradation
# requires classifier/backbone joint optimisation (or LR coupling).
#
# Interpretation table (from plan §6.8):
#   E3 degrades same as E1  → noise supervision directly damages visual reps
#   E3 stable, E1 degrades  → classifier/backbone joint opt or LR coupling issue
#   E3 improves             → visual adaptation may work, classifier update masked gains
#   E3 unchanged, drift≈0   → LR/gradient too small, PEFT not actually happening
#
# Run: python3 -m experiments.baseline.train --config configs/s_peft_e3_backbone_only.yaml \
#        --init-checkpoint outputs/w1_gce05_mixup/seed42/checkpoints/best.pt

experiment:
  id: S_PEFT_E3_BACKBONE_ONLY
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions: [.jpg, .jpeg, .png, .bmp, .webp]
  seed: 42
  split_seed: 42
  train_seed: 42
  split_dir: outputs/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: false
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

peft:
  type: visual_layernorm_only
  backbone_lr: 0.000001
  backbone_weight_decay: 0.01
  freeze_classifier: true

loss:
  name: gce
  q: 0.5
  probability_epsilon: 1.0e-7

mixup:
  enabled: true
  alpha: 0.2
  probability: 0.2

eval:
  batch_size: 256

output:
  log_dir: outputs/s_peft/e3_backbone_only/seed42/logs
  submission_dir: outputs/s_peft/e3_backbone_only/seed42/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 5
  image_size: 224
  lr: 0.0001
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/s_peft/e3_backbone_only/seed42/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 3
