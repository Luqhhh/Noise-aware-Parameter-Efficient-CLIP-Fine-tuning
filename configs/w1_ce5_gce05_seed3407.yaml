# Multi-seed confirmation for W1_CE5_GCE05.
# Keep the seed42 reference split fixed; change training randomness only.

experiment:
  id: W1_CE5_GCE05_SEED3407
  mode: dev
  head_type: linear
  augmentation_preset: a0

data:
  stage: preliminary
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  seed: 42
  split_seed: 42
  train_seed: 3407
  split_dir: outputs/baselines/ref/seed42
  test_dir: test
  train_dir: train
  val_ratio: 0.1
  expected_num_classes: 500
  class_mapping_path: outputs/data/master_splits/seed42
  use_full_training_set: false

model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
  unfreeze_last_n_blocks: 0
  train_ln_post: false
  train_visual_proj: false

loss:
  schedule:
    - start_epoch: 1
      end_epoch: 5
      name: cross_entropy
    - start_epoch: 6
      end_epoch: 50
      name: gce
      q: 0.5
      probability_epsilon: 1.0e-7

eval:
  batch_size: 256

output:
  log_dir: outputs/gce/ce5_gce_q05/seed3407/logs
  submission_dir: outputs/gce/ce5_gce_q05/seed3407/submissions

train:
  amp: true
  batch_size: 128
  device: cuda
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/gce/ce5_gce_q05/seed3407/checkpoints
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
  min_lr_ratio: 0.01
  early_stop_patience: 10
