data:
  class_mapping_path: outputs/metadata
  expected_num_classes: 500
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .webp
  split_dir: outputs/e2b/splits
  split_seed: 42
  stage: preliminary
  test_dir: test
  train_dir: train
  train_seed: 42
  use_full_training_set: false
  val_ratio: 0.1
eval:
  batch_size: 256
experiment:
  augmentation_preset: a1
  head_type: linear
  id: E2b
  mode: dev
model:
  clip_model_name: ViT-B/32
  feature_dim: 512
  freeze_clip: true
  num_classes: 500
  use_cached_features: false
output:
  log_dir: outputs/e2b/logs
  submission_dir: outputs/e2b/submissions
runtime:
  augmentation_preset: a1
  experiment_id: E2b
  head_type: linear
  mode: dev
  use_cached_features: false
train:
  amp: true
  batch_size: 128
  device: cuda
  early_stop_patience: 10
  epochs: 50
  image_size: 224
  lr: 0.005
  max_grad_norm: 1.0
  num_workers: 8
  save_dir: outputs/e2b/checkpoints
  scheduler: cosine
  warmup_epochs: 1
  weight_decay: 0.0001
